# ==============================================================================
#
#                         H2O-3 GITHUB ACTIONS WORKFLOW INDEX
#                         ===================================
#
#   This index provides a quick reference to all H2O-3 CI/CD workflows.
#   Workflows are numbered for easy navigation in the GitHub Actions UI.
#
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │  PUBLIC WORKFLOWS (1.x) - Open Source H2O-3                             │
#   ├─────────────────────────────────────────────────────────────────────────┤
#   │  1.a  Nightly - Tests      Run full test suite (Smoke, Python, R, etc)  │
#   │  1.b  Nightly Release      Build & publish nightly artifacts to S3      │
#   │  1.c  Official Release     Production release (PyPI, Conda, Docker)     │
#   │  1.d  Test Release         Test release to staging environment          │
#   │  1.e  Nightly Merge        Auto-merge release branch into master        │
#   │  1.f  Nightly Scheduler    Cron trigger for nightly pipelines           │
#   │  1.g  JUnit Tests          Comprehensive JUnit test suite               │
#   └─────────────────────────────────────────────────────────────────────────┘
#
#   CURRENT FILE: 1.g  -  Public H2O-3 JUnit Tests
#
# ==============================================================================
#
#                 PUBLIC H2O-3 JUNIT TEST PIPELINE
#                 ================================
#
#   Comprehensive JUnit testing across Java 8, 11, and 17.
#   Tests are split by algorithm/module for parallel execution.
#
# ==============================================================================
#
#   ARCHITECTURE
#   ------------
#
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │                            JUNIT-MAIN                                   │
#   │                         (This Workflow)                                 │
#   └─────────────────────────────────────────────────────────────────────────┘
#                                      │
#                    ┌─────────────────┴─────────────────┐
#                    │                                   │
#                    ▼                                   ▼
#             ┌─────────────┐                    ┌─────────────┐
#             │    INIT     │                    │    BUILD    │
#             │  (config)   │                    │   (H2O-3)   │
#             └─────────────┘                    └─────────────┘
#                                                       │
#              ┌────────────────────────────────────────┼────────────────────┐
#              │                                        │                    │
#              ▼                                        ▼                    ▼
#       ┌─────────────┐                         ┌─────────────┐     ┌─────────────┐
#       │   JAVA 8    │                         │   JAVA 11   │     │   JAVA 17   │
#       │ (26 tests)  │                         │ (18 tests)  │     │ (18 tests)  │
#       │  - Smoke    │                         │  - Smoke    │     │  - Smoke    │
#       │  - Algos    │                         │  - Algos    │     │  - Algos    │
#       │  - Core     │                         │  - Other    │     │  - Other    │
#       │  - AutoML   │                         └─────────────┘     └─────────────┘
#       │  - Persist  │
#       └─────────────┘
#                                      │
#                                      ▼
#                             ┌─────────────┐
#                             │   SUMMARY   │
#                             │  (results)  │
#                             └─────────────┘
#
#   TEST BREAKDOWN & MAKE TARGETS
#   ------------------------------
#
#   Java 8 (26 jobs):
#     - Smoke:    test-junit-smoke-jenkins
#     - Algos:    test-junit-algos-{glm,gbm,drf,deeplearning,gam,tree-generic,
#                 ensemble,kmeans,rulefit,pca,glrm,adaboost,modelselection,
#                 generic,grid,misc}-jenkins
#     - Core:     test-junit-core-jenkins
#     - Mojo:     test-junit-mojo-pipeline-jenkins
#     - AutoML:   test-junit-automl-jenkins
#     - Cluster:  test-junit-clustering-jenkins
#     - XGBoost:  test-junit-xgb-multi-jenkins
#     - Other:    test-junit-other-jenkins
#     - Persist:  test-junit-persist-{s3,gcs,http}-jenkins
#
#   Java 11 (18 jobs):
#     - Smoke:    test-junit-smoke-jenkins (with java=11)
#     - Algos:    test-junit-algos-{glm,gbm,drf,deeplearning,gam,tree-generic,
#                 ensemble,kmeans,rulefit,pca,glrm,adaboost,modelselection,
#                 generic,grid,misc}-jenkins (with java=11)
#     - Other:    test-junit-11-other-jenkins
#
#   Java 17 (18 jobs):
#     - Smoke:    test-junit-17-smoke-jenkins
#     - Other:    test-junit-17-other-jenkins
#     - Algos:    test-junit-17-algos-{glm,gbm,drf,deeplearning,gam,tree-generic,
#                 ensemble,kmeans,rulefit,pca,glrm,adaboost,modelselection,
#                 generic,grid,misc}-jenkins
#
#   NOTE: Test separation done on GitHub branch in h2oai/h2o-3
#         10-minute timeout per test to eliminate hangs
#
# ==============================================================================

run-name: "1.g  -  Public H2O-3 Nightly - JUnit Tests [${{ inputs.branch || (github.event.schedule == '0 5 * * *' && 'rel-3.46.0') || 'master' }}]"
name: 1.g  -  Public H2O-3 Nightly - JUnit Tests

# ==============================================================================
# TRIGGERS
# ==============================================================================
on:
  # Nightly schedules - 3 hour gap between branches to avoid resource contention
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC - master
    - cron: '0 5 * * *'  # Daily at 5 AM UTC - rel branch (3 hours after master)

  workflow_dispatch:
    inputs:
      branch:
        description: 'H2O-3 branch to test (any branch in h2oai/h2o-3)'
        required: true
        default: 'master'
        type: string

      run_java8:
        description: 'Run Java 8 JUnit Tests (26 parallel jobs)'
        required: false
        type: boolean
        default: true

      run_java11:
        description: 'Run Java 11 JUnit Tests (18 parallel jobs)'
        required: false
        type: boolean
        default: true

      run_java17:
        description: 'Run Java 17 JUnit Tests (18 parallel jobs)'
        required: false
        type: boolean
        default: true

# ==============================================================================
# CONCURRENCY
# ==============================================================================
concurrency:
  group: junit-${{ inputs.branch || (github.event.schedule == '0 5 * * *' && 'rel-3.46.0') || 'master' }}
  cancel-in-progress: false

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
  contents: read
  id-token: write
  checks: write
  actions: read

# ==============================================================================
# JOBS
# ==============================================================================
jobs:

  # ============================================================================
  # INIT: Determine what to run
  # ============================================================================
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.config.outputs.branch }}
      run_java8: ${{ steps.config.outputs.run_java8 }}
      run_java11: ${{ steps.config.outputs.run_java11 }}
      run_java17: ${{ steps.config.outputs.run_java17 }}

    steps:
      - name: Determine Configuration
        id: config
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine branch based on trigger type
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # For scheduled runs, select branch based on cron schedule
            if [[ "${{ github.event.schedule }}" == "0 2 * * *" ]]; then
              BRANCH="master"
            elif [[ "${{ github.event.schedule }}" == "0 5 * * *" ]]; then
              BRANCH="rel-3.46.0"
            else
              BRANCH="master"
            fi
          else
            # For manual runs, use input or default to master
            BRANCH="${{ inputs.branch || 'master' }}"
          fi
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

          # Validate branch exists - fail fast to avoid wasting 62 EC2 instances
          if ! gh api "repos/h2oai/h2o-3/branches/${BRANCH}" >/dev/null 2>&1; then
            echo "::error::Branch '${BRANCH}' does not exist in h2oai/h2o-3"
            exit 1
          fi
          echo "Branch '${BRANCH}' verified in h2oai/h2o-3"

          # Test categories (from checkbox inputs, default to true for schedule/push triggers)
          RUN_JAVA8="${{ inputs.run_java8 }}"
          RUN_JAVA11="${{ inputs.run_java11 }}"
          RUN_JAVA17="${{ inputs.run_java17 }}"

          # Default to true for schedule and push triggers (when inputs are empty)
          if [[ -z "$RUN_JAVA8" ]]; then
            RUN_JAVA8="true"
          fi
          if [[ -z "$RUN_JAVA11" ]]; then
            RUN_JAVA11="true"
          fi
          if [[ -z "$RUN_JAVA17" ]]; then
            RUN_JAVA17="true"
          fi

          echo "run_java8=${RUN_JAVA8}" >> $GITHUB_OUTPUT
          echo "run_java11=${RUN_JAVA11}" >> $GITHUB_OUTPUT
          echo "run_java17=${RUN_JAVA17}" >> $GITHUB_OUTPUT

          # Summary
          echo "## JUnit Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 8 | ${RUN_JAVA8} (26 jobs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 11 | ${RUN_JAVA11} (18 jobs) |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 17 | ${RUN_JAVA17} (18 jobs) |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # BUILD: Compile H2O-3 and create test packages
  # ============================================================================
  build:
    name: Build
    needs: init
    uses: ./.github/workflows/nightly-build.yml
    with:
      h2o3_branch: ${{ needs.init.outputs.branch }}
      repository: h2oai/h2o-3
    secrets: inherit

  # ============================================================================
  # JUNIT TEST SUITES (Run in parallel after build)
  # ============================================================================
  java8:
    name: Java 8 JUnit
    needs: [init, build]
    if: needs.init.outputs.run_java8 == 'true'
    uses: ./.github/workflows/nightly-junit-java8-tests.yml
    with:
      h2o3_branch: ${{ needs.init.outputs.branch }}
    secrets: inherit

  java11:
    name: Java 11 JUnit
    needs: [init, build]
    if: needs.init.outputs.run_java11 == 'true'
    uses: ./.github/workflows/nightly-junit-java11-tests.yml
    with:
      h2o3_branch: ${{ needs.init.outputs.branch }}
    secrets: inherit

  java17:
    name: Java 17 JUnit
    needs: [init, build]
    if: needs.init.outputs.run_java17 == 'true'
    uses: ./.github/workflows/nightly-junit-java17-tests.yml
    with:
      h2o3_branch: ${{ needs.init.outputs.branch }}
    secrets: inherit

  # ============================================================================
  # SUMMARY: Generate test results dashboard and send Slack alert
  # ============================================================================
  summary:
    name: Summary
    needs: [init, build, java8, java11, java17]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JUnit Test Dashboard
        id: dashboard
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ needs.init.outputs.branch }}
          BUILD_SHA: ${{ needs.build.outputs.build_sha }}
          BUILD_RESULT: ${{ needs.build.result }}
          JAVA8_RESULT: ${{ needs.java8.result }}
          JAVA11_RESULT: ${{ needs.java11.result }}
          JAVA17_RESULT: ${{ needs.java17.result }}
        run: |
          # Fetch all jobs to temp file (NDJSON format - one JSON object per line)
          echo "Fetching jobs for run ${{ github.run_id }}..."
          if ! gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --paginate \
            --jq '.jobs[] | {name: .name, conclusion: .conclusion, status: .status, started_at: .started_at, completed_at: .completed_at, html_url: .html_url}' \
            > /tmp/jobs.json; then
            echo "Warning: Failed to fetch jobs, creating empty file"
            echo "" > /tmp/jobs.json
          fi
          echo "Jobs fetched: $(wc -l < /tmp/jobs.json) lines"

          # Count failures
          FAILED_COUNT=0
          [[ "$BUILD_RESULT" == "failure" ]] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [[ "$JAVA8_RESULT" == "failure" ]] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [[ "$JAVA11_RESULT" == "failure" ]] && FAILED_COUNT=$((FAILED_COUNT + 1))
          [[ "$JAVA17_RESULT" == "failure" ]] && FAILED_COUNT=$((FAILED_COUNT + 1))

          # Status badge helper
          status_badge() {
            case "$1" in
              success) echo "✅ PASS" ;;
              failure) echo "❌ FAIL" ;;
              cancelled) echo "⚪ CANCELLED" ;;
              skipped) echo "⏭️ SKIPPED" ;;
              *) echo "⚪ $1" ;;
            esac
          }

          # Check if job should be skipped (infrastructure jobs)
          is_infra_job() {
            local name="$1"
            [[ "$name" == "Summary" ]] && return 0
            [[ "$name" == "Initialize" ]] && return 0
            [[ "$name" == "Build" ]] && return 0
            [[ "$name" == Start* ]] && return 0
            [[ "$name" == Stop* ]] && return 0
            [[ "$name" == *" / Start"* ]] && return 0
            [[ "$name" == *" / Stop"* ]] && return 0
            return 1
          }

          # Get Java version category from job name
          get_java_version() {
            local name="$1"
            if [[ "$name" == *"Java 8"* ]] || [[ "$name" == "Java 8 Tests /"* ]]; then
              echo "java8"
            elif [[ "$name" == *"Java 11"* ]] || [[ "$name" == "Java 11 Tests /"* ]]; then
              echo "java11"
            elif [[ "$name" == *"Java 17"* ]] || [[ "$name" == "Java 17 Tests /"* ]]; then
              echo "java17"
            else
              echo "other"
            fi
          }

          # Initialize counters for each Java version
          java8_passed=0
          java8_failed=0
          java8_total=0
          java11_passed=0
          java11_failed=0
          java11_total=0
          java17_passed=0
          java17_failed=0
          java17_total=0

          # First pass: count passed/failed for each Java version
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            name=$(echo "$line" | jq -r '.name // empty')
            [[ -z "$name" ]] && continue

            # Skip infrastructure jobs
            is_infra_job "$name" && continue

            conclusion=$(echo "$line" | jq -r '.conclusion // "pending"')
            result="$conclusion"
            [[ "$result" == "null" || -z "$result" ]] && result="pending"

            java_ver=$(get_java_version "$name")

            case "$java_ver" in
              java8)
                java8_total=$((java8_total + 1))
                [[ "$result" == "success" ]] && java8_passed=$((java8_passed + 1))
                [[ "$result" == "failure" ]] && java8_failed=$((java8_failed + 1))
                ;;
              java11)
                java11_total=$((java11_total + 1))
                [[ "$result" == "success" ]] && java11_passed=$((java11_passed + 1))
                [[ "$result" == "failure" ]] && java11_failed=$((java11_failed + 1))
                ;;
              java17)
                java17_total=$((java17_total + 1))
                [[ "$result" == "success" ]] && java17_passed=$((java17_passed + 1))
                [[ "$result" == "failure" ]] && java17_failed=$((java17_failed + 1))
                ;;
            esac
          done < /tmp/jobs.json

          echo "Counted jobs - Java8: ${java8_total} (${java8_passed}/${java8_failed}), Java11: ${java11_total} (${java11_passed}/${java11_failed}), Java17: ${java17_total} (${java17_passed}/${java17_failed})"

          # Export counts for Slack alert
          echo "java8_passed=${java8_passed}" >> $GITHUB_OUTPUT
          echo "java8_failed=${java8_failed}" >> $GITHUB_OUTPUT
          echo "java8_total=${java8_total}" >> $GITHUB_OUTPUT
          echo "java11_passed=${java11_passed}" >> $GITHUB_OUTPUT
          echo "java11_failed=${java11_failed}" >> $GITHUB_OUTPUT
          echo "java11_total=${java11_total}" >> $GITHUB_OUTPUT
          echo "java17_passed=${java17_passed}" >> $GITHUB_OUTPUT
          echo "java17_failed=${java17_failed}" >> $GITHUB_OUTPUT
          echo "java17_total=${java17_total}" >> $GITHUB_OUTPUT

          # Header
          echo "# H2O-3 JUnit Test Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ $FAILED_COUNT -gt 0 ]]; then
            echo "**${FAILED_COUNT} test suite(s) failed.** See details below." >> $GITHUB_STEP_SUMMARY
          else
            echo "**All test suites passed!**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build Information
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${BUILD_SHA:-N/A}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(status_badge ${BUILD_RESULT:-skipped}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test Results Summary
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Jobs | Passed | Failed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|:----:|:------:|:------:|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Java 8 JUnit | ${java8_total} | ${java8_passed} | ${java8_failed} | $(status_badge ${JAVA8_RESULT:-skipped}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 11 JUnit | ${java11_total} | ${java11_passed} | ${java11_failed} | $(status_badge ${JAVA11_RESULT:-skipped}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 17 JUnit | ${java17_total} | ${java17_passed} | ${java17_failed} | $(status_badge ${JAVA17_RESULT:-skipped}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Detailed job results from API
          echo "## Detailed Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|----------|" >> $GITHUB_STEP_SUMMARY

          # Track failed jobs for later (both for summary and JSON output)
          FAILED_JOBS=""
          FAILED_JOBS_JSON="["
          FIRST_FAILED=true

          # Process each job from temp file
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            name=$(echo "$line" | jq -r '.name // empty')
            [[ -z "$name" ]] && continue

            # Skip infrastructure jobs
            is_infra_job "$name" && continue

            conclusion=$(echo "$line" | jq -r '.conclusion // "pending"')
            status=$(echo "$line" | jq -r '.status // "queued"')
            started=$(echo "$line" | jq -r '.started_at // ""')
            completed=$(echo "$line" | jq -r '.completed_at // ""')
            html_url=$(echo "$line" | jq -r '.html_url // ""')

            # Use conclusion if available, otherwise status
            result="$conclusion"
            [[ "$result" == "null" || -z "$result" ]] && result="$status"

            # Track failed jobs (for summary and JSON)
            if [[ "$result" == "failure" ]]; then
              FAILED_JOBS="${FAILED_JOBS}${name}\n"
              # Build JSON array entry
              if [[ "$FIRST_FAILED" == "true" ]]; then
                FIRST_FAILED=false
              else
                FAILED_JOBS_JSON="${FAILED_JOBS_JSON},"
              fi
              # Escape name for JSON
              escaped_name=$(echo "$name" | sed 's/"/\\"/g')
              FAILED_JOBS_JSON="${FAILED_JOBS_JSON}{\"name\":\"${escaped_name}\",\"url\":\"${html_url}\"}"
            fi

            # Calculate duration
            duration="-"
            if [[ -n "$started" && -n "$completed" && "$started" != "null" && "$completed" != "null" ]]; then
              start_sec=$(date -d "$started" +%s 2>/dev/null || echo "0")
              end_sec=$(date -d "$completed" +%s 2>/dev/null || echo "0")
              if [[ $start_sec -gt 0 && $end_sec -gt 0 ]]; then
                duration_sec=$((end_sec - start_sec))
                if [[ $duration_sec -ge 3600 ]]; then
                  duration="$((duration_sec / 3600))h $((duration_sec % 3600 / 60))m"
                elif [[ $duration_sec -ge 60 ]]; then
                  duration="$((duration_sec / 60))m $((duration_sec % 60))s"
                else
                  duration="${duration_sec}s"
                fi
              fi
            fi

            echo "| ${name} | $(status_badge ${result}) | ${duration} |" >> $GITHUB_STEP_SUMMARY
          done < /tmp/jobs.json

          # Close JSON array and output for Slack
          FAILED_JOBS_JSON="${FAILED_JOBS_JSON}]"
          echo "failed_jobs_json=${FAILED_JOBS_JSON}" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY

          # Failed Jobs Section
          if [[ -n "$FAILED_JOBS" ]]; then
            echo "## ❌ Failed Jobs" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
            echo -e "$FAILED_JOBS" | while read -r fname; do
              [[ -n "$fname" ]] && echo "| ${fname} | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Summary Statistics
          echo "## Summary Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(status_badge ${BUILD_RESULT:-skipped}) | ${BUILD_RESULT:-skipped} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 8 Tests | $(status_badge ${JAVA8_RESULT:-skipped}) | ${JAVA8_RESULT:-skipped} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 11 Tests | $(status_badge ${JAVA11_RESULT:-skipped}) | ${JAVA11_RESULT:-skipped} |" >> $GITHUB_STEP_SUMMARY
          echo "| Java 17 Tests | $(status_badge ${JAVA17_RESULT:-skipped}) | ${JAVA17_RESULT:-skipped} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Dashboard generated at $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY

      - name: Set Final Status
        run: |
          BUILD="${{ needs.build.result }}"
          JAVA8="${{ needs.java8.result }}"
          JAVA11="${{ needs.java11.result }}"
          JAVA17="${{ needs.java17.result }}"

          if [[ "$BUILD" == "failure" ]]; then
            echo "::error::Build failed"
            exit 1
          fi

          if [[ "$JAVA8" == "failure" ]]; then
            echo "::error::Java 8 JUnit tests failed"
            exit 1
          fi

          if [[ "$JAVA11" == "failure" ]]; then
            echo "::error::Java 11 JUnit tests failed"
            exit 1
          fi

          if [[ "$JAVA17" == "failure" ]]; then
            echo "::error::Java 17 JUnit tests failed"
            exit 1
          fi

          echo "All requested tests passed!"

      - name: Send Slack Alert
        if: always()
        uses: ./.github/actions/send-junit-slack-alert
        with:
          channel: "#h2o-3-alerts"
          branch: ${{ needs.init.outputs.branch }}
          build_sha: ${{ needs.build.outputs.build_sha }}
          build_result: ${{ needs.build.result }}
          java8_result: ${{ needs.java8.result }}
          java8_passed: ${{ steps.dashboard.outputs.java8_passed }}
          java8_failed: ${{ steps.dashboard.outputs.java8_failed }}
          java8_total: ${{ steps.dashboard.outputs.java8_total }}
          java11_result: ${{ needs.java11.result }}
          java11_passed: ${{ steps.dashboard.outputs.java11_passed }}
          java11_failed: ${{ steps.dashboard.outputs.java11_failed }}
          java11_total: ${{ steps.dashboard.outputs.java11_total }}
          java17_result: ${{ needs.java17.result }}
          java17_passed: ${{ steps.dashboard.outputs.java17_passed }}
          java17_failed: ${{ steps.dashboard.outputs.java17_failed }}
          java17_total: ${{ steps.dashboard.outputs.java17_total }}
          failed_jobs_json: ${{ steps.dashboard.outputs.failed_jobs_json }}
          workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          event-name: ${{ github.event_name }}
