# ==============================================================================
#                         ENTERPRISE NIGHTLY SCHEDULER
# ==============================================================================
#
# PURPOSE:
#   Triggers the nightly pipeline for H2O-3 Enterprise.
#
# BRANCHES:
#   - master (only)
#
# SCHEDULE:
#   Daily at 2:00 AM UTC
#
# ==============================================================================

name: Enterprise Nightly Scheduler

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to run (comma-separated, or "all" for default branches)'
        required: false
        default: 'all'
        type: string

permissions:
  actions: write
  contents: read

jobs:
  trigger:
    name: Trigger master
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Enterprise Nightly Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering enterprise nightly workflow for branch: master"

          gh workflow run h2o-3-nightly-tests-enterprise.yml \
            --repo ${{ github.repository }} \
            -f branch="master" \
            -f run_smoke=true \
            -f run_python=true \
            -f run_r=true \
            -f run_java=true \
            -f run_flow=true

          echo "Enterprise pipeline triggered for master"
