    name: Start EC2 - CDH 6.1 Steam Driver
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh61-krb-steam-driver
    secrets: inherit

  start-cdh61-steam-mapper:
    name: Start EC2 - CDH 6.1 Steam Mapper
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh61-krb-steam-mapper
    secrets: inherit

  start-cdh61-sparkling:
    name: Start EC2 - CDH 6.1 Sparkling
    uses: ./.github/workflows/ec2-runner-start.yml
