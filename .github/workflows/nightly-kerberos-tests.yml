  # ============================================================================
  # RUN TESTS - CDH 5.10 (Hadoop 2)
  # ============================================================================
  cdh510-standalone:
    name: CDH 5.10 - STANDALONE
    needs: start-cdh510-standalone
    runs-on: ${{ needs.start-cdh510-standalone.outputs.label }}
    timeout-minutes: 105
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: CDH 5.10 - STANDALONE (Kerberos)
          make_target: test-kerberos-hadoop-2
          test_package: hadoop
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
        env:
          KERBEROS_MODE: STANDALONE
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: CDH 5.10 - STANDALONE (Kerberos)
          job_status: ${{ job.status }}

  cdh510-standalone-keytab:
