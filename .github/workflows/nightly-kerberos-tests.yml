# ==============================================================================
#                          KERBEROS TEST SUITE
# ==============================================================================
#
# 20 Kerberos authentication tests - All on EC2 runners
# (2 distributions x 10 auth modes)
#
# DISTRIBUTIONS:
#   - CDH 5.10 (Hadoop 2)
#   - CDH 6.1 (Hadoop 3)
#
# AUTH MODES (10 per distribution):
#   - STANDALONE
#   - STANDALONE KEYTAB
#   - DRIVER KEYTAB
#   - HADOOP
#   - HADOOP WITH SPNEGO
#   - HADOOP WITH HDFS TOKEN REFRESH
#   - STEAM DRIVER
#   - STEAM MAPPER
#   - SPARKLING
#   - STEAM SPARKLING
#
# ARCHITECTURE:
#   1. Start 20 EC2 runners in parallel
#   2. Run tests on each dedicated runner
#   3. Stop all runners (always, for cleanup)
#
# ==============================================================================

name: Nightly Kerberos Tests

on:
  workflow_call:
    inputs:
      h2o3_branch:
        description: 'H2O-3 branch to test'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  checks: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 353750902984.dkr.ecr.us-east-1.amazonaws.com
  ECR_ROLE: arn:aws:iam::353750902984:role/GitHub-OIDC-Role
  DOCKER_VERSION: "46"
  H2O3_REPO: h2oai/h2o-3
  RETENTION: 14
  EFS_SMALLDATA: /home/ubuntu/smalldata
  EFS_BIGDATA: /home/ubuntu/bigdata
  HADOOP_IMAGE_VERSION: 84

jobs:
  # ============================================================================
  # START EC2 RUNNERS (20 in parallel)
  # ============================================================================

  # CDH 5.10 (Hadoop 2) - 10 modes
  start-cdh510-standalone:
    name: Start EC2 - CDH 5.10 Standalone
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-standalone
    secrets: inherit

  start-cdh510-standalone-keytab:
    name: Start EC2 - CDH 5.10 Standalone Keytab
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-standalone-keytab
    secrets: inherit

  start-cdh510-driver-keytab:
    name: Start EC2 - CDH 5.10 Driver Keytab
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-driver-keytab
    secrets: inherit

  start-cdh510-hadoop:
    name: Start EC2 - CDH 5.10 Hadoop
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-hadoop
    secrets: inherit

  start-cdh510-hadoop-spnego:
    name: Start EC2 - CDH 5.10 Hadoop SPNEGO
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-hadoop-spnego
    secrets: inherit

  start-cdh510-hadoop-hdfs-refresh:
    name: Start EC2 - CDH 5.10 HDFS Refresh
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-hdfs-refresh
    secrets: inherit

  start-cdh510-steam-driver:
    name: Start EC2 - CDH 5.10 Steam Driver
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-steam-driver
    secrets: inherit

  start-cdh510-steam-mapper:
    name: Start EC2 - CDH 5.10 Steam Mapper
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-steam-mapper
    secrets: inherit

  start-cdh510-sparkling:
    name: Start EC2 - CDH 5.10 Sparkling
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-sparkling
    secrets: inherit

  start-cdh510-steam-sparkling:
    name: Start EC2 - CDH 5.10 Steam Sparkling
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: cdh510-krb-steam-sparkling
    secrets: inherit

  # CDH 6.1 (Hadoop 3) - 10 modes
  start-cdh61-standalone:
    name: Start EC2 - CDH 6.1 Standalone
    uses: ./.github/workflows/ec2-runner-start.yml
