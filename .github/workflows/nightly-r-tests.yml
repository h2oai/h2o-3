          name: R3.4 Medium-large
          make_target: test-r-medium-large
          test_package: r
          r: "3.4.1"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.4 Medium-large
          job_status: ${{ job.status }}

  r34-small:
    name: R3.4 Small
    needs: start-r34-small
    runs-on: ${{ needs.start-r34-small.outputs.label }}
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.4 Small
          make_target: test-r-small
          test_package: r
          r: "3.4.1"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
