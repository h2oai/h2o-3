  # ============================================================================
  # STOP EC2 RUNNERS (Always run for cleanup)
  # ============================================================================
  stop-r35-init-java8:
    name: Stop - R3.5 Init Java 8
    needs: [start-r35-init-java8, r35-init-java8]
    if: always()
    uses: ./.github/workflows/ec2-runner-stop.yml
    with:
      label: ${{ needs.start-r35-init-java8.outputs.label }}
      ec2_id: ${{ needs.start-r35-init-java8.outputs.ec2_id }}
    secrets: inherit

  stop-r35-small:
    name: Stop - R3.5 Small
    needs: [start-r35-small, r35-small]
    if: always()
    uses: ./.github/workflows/ec2-runner-stop.yml
    with:
      label: ${{ needs.start-r35-small.outputs.label }}
      ec2_id: ${{ needs.start-r35-small.outputs.ec2_id }}
