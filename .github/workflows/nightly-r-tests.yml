      ec2_id: ${{ needs.start-r35-medium-large.outputs.ec2_id }}
    secrets: inherit

  stop-r35-demos-medium-large:
    name: Stop - R3.5 Demos Medium-large
    needs: [start-r35-demos-medium-large, r35-demos-medium-large]
    if: always()
