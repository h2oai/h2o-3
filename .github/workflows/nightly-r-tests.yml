# ==============================================================================
#                              R TEST SUITE
# ==============================================================================
#
# 18 R tests across R 3.4.1, 3.5.3, 4.0.2, and 4.4.0
# All tests run on EC2 runners with EFS access for test data
#
# CATEGORIES:
#   - PR_STAGES (11)      : Init, small, AutoML, CMD check, booklets, demos
#   - MASTER_STAGES (1)   : Datatable
#   - NIGHTLY_REPEATED (4): Multi-version compatibility
#   - NIGHTLY_STAGES (2)  : Explain tests
#
# ==============================================================================

name: R Tests

on:
  workflow_call:
    inputs:
      h2o3_branch:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  checks: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 353750902984.dkr.ecr.us-east-1.amazonaws.com
  ECR_ROLE: arn:aws:iam::353750902984:role/GitHub-OIDC-Role
  DOCKER_VERSION: "46"
  H2O3_REPO: h2oai/h2o-3
  RETENTION: 14
  EFS_SMALLDATA: /home/ubuntu/smalldata
  EFS_BIGDATA: /home/ubuntu/bigdata

jobs:
  # ============================================================================
  # START EC2 RUNNERS (18 in parallel)
  # ============================================================================
  start-r35-init-java8:
    name: Start - R3.5 Init Java 8
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-init-java8
    secrets: inherit

  start-r35-small:
    name: Start - R3.5 Small
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-small
    secrets: inherit

  start-r35-automl:
    name: Start - R3.5 AutoML
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-automl
    secrets: inherit

  start-r35-cmd-check:
    name: Start - R3.5 CMD Check
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-cmd-check
    secrets: inherit

  start-r40-small:
    name: Start - R4.0 Small
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r40-small
    secrets: inherit

  start-r40-cmd-check:
    name: Start - R4.0 CMD Check
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r40-cmd-check
    secrets: inherit

  start-r35-booklets:
    name: Start - R3.5 Booklets
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-booklets
    secrets: inherit

  start-r35-demos-small:
    name: Start - R3.5 Demos Small
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-demos-small
    secrets: inherit

  start-r35-medium-large:
    name: Start - R3.5 Medium-large
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-medium-large
    secrets: inherit

  start-r35-demos-medium-large:
    name: Start - R3.5 Demos Medium-large
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-demos-ml
    secrets: inherit

  start-r35-generate-docs:
    name: Start - R3.5 Generate Docs
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-docs
    secrets: inherit

  start-r35-datatable:
    name: Start - R3.5 Datatable
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-datatable
    secrets: inherit

  start-r35-init-java11:
    name: Start - R3.5 Init Java 11
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r35-init-java11
    secrets: inherit

  start-r34-medium-large:
    name: Start - R3.4 Medium-large
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r34-medium-large
    secrets: inherit

  start-r34-small:
    name: Start - R3.4 Small
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r34-small
    secrets: inherit

  start-r34-automl:
    name: Start - R3.4 AutoML
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r34-automl
    secrets: inherit

  start-r40-explain:
    name: Start - R4.0 Explain
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r40-explain
    secrets: inherit

  start-r44-explain:
    name: Start - R4.4 Explain
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: r44-explain
    secrets: inherit

  # ============================================================================
  # R TESTS (Run on dedicated EC2 runners)
  # ============================================================================

  # ===================== PR_STAGES =====================
  r35-init-java8:
    name: R3.5 Init Java 8
    needs: start-r35-init-java8
    runs-on: ${{ needs.start-r35-init-java8.outputs.label }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Init Java 8
          make_target: test-r-init
          test_package: r
          r: "3.5.3"
          java: "8"
          image: r-3.5.3-jdk-8
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Init Java 8
          job_status: ${{ job.status }}

  r35-small:
    name: R3.5 Small
    needs: start-r35-small
    runs-on: ${{ needs.start-r35-small.outputs.label }}
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Small
          make_target: test-r-small
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Small
          job_status: ${{ job.status }}

  r35-automl:
    name: R3.5 AutoML
    needs: start-r35-automl
    runs-on: ${{ needs.start-r35-automl.outputs.label }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 AutoML
          make_target: test-r-automl
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 AutoML
          job_status: ${{ job.status }}

  r35-cmd-check:
    name: R3.5 CMD Check as CRAN
    needs: start-r35-cmd-check
    runs-on: ${{ needs.start-r35-cmd-check.outputs.label }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 CMD Check as CRAN
          make_target: test-r-cmd-check-as-cran
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 CMD Check as CRAN
          job_status: ${{ job.status }}

  r40-small:
    name: R4.0 Small
    needs: start-r40-small
    runs-on: ${{ needs.start-r40-small.outputs.label }}
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R4.0 Small
          make_target: test-r-small
          test_package: r
          r: "4.0.2"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R4.0 Small
          job_status: ${{ job.status }}

  r40-cmd-check:
    name: R4.0 CMD Check as CRAN
    needs: start-r40-cmd-check
    runs-on: ${{ needs.start-r40-cmd-check.outputs.label }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R4.0 CMD Check as CRAN
          make_target: test-r-cmd-check-as-cran
          test_package: r
          r: "4.0.2"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R4.0 CMD Check as CRAN
          job_status: ${{ job.status }}

  r35-booklets:
    name: R3.5 Booklets
    needs: start-r35-booklets
    runs-on: ${{ needs.start-r35-booklets.outputs.label }}
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Booklets
          make_target: test-r-booklets
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Booklets
          job_status: ${{ job.status }}

  r35-demos-small:
    name: R3.5 Demos Small
    needs: start-r35-demos-small
    runs-on: ${{ needs.start-r35-demos-small.outputs.label }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Demos Small
          make_target: test-r-demos-small
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Demos Small
          job_status: ${{ job.status }}

  r35-medium-large:
    name: R3.5 Medium-large
    needs: start-r35-medium-large
    runs-on: ${{ needs.start-r35-medium-large.outputs.label }}
    timeout-minutes: 230
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Medium-large
          make_target: test-r-medium-large
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
