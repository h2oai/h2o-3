      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Demos Medium-large
          make_target: test-r-demos-medium-large
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Demos Medium-large
          job_status: ${{ job.status }}

  r35-generate-docs:
    name: R3.5 Generate Docs
    needs: start-r35-generate-docs
    runs-on: ${{ needs.start-r35-generate-docs.outputs.label }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Generate Docs
          make_target: r-generate-docs-jenkins
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Generate Docs
          job_status: ${{ job.status }}

  # ===================== MASTER_STAGES =====================
  r35-datatable:
    name: R3.5 Datatable
    needs: start-r35-datatable
    runs-on: ${{ needs.start-r35-datatable.outputs.label }}
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Datatable
          make_target: test-r-datatable
          test_package: r
          r: "3.5.3"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Datatable
          job_status: ${{ job.status }}

  # ===================== NIGHTLY_REPEATED =====================
  r35-init-java11:
    name: R3.5 Init Java 11
    needs: start-r35-init-java11
    runs-on: ${{ needs.start-r35-init-java11.outputs.label }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.5 Init Java 11
          make_target: test-r-init
          test_package: r
          r: "3.5.3"
          java: "11"
          image: r-3.5.3-jdk-11
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.5 Init Java 11
          job_status: ${{ job.status }}

