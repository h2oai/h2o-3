    needs: start-r34-automl
    runs-on: ${{ needs.start-r34-automl.outputs.label }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: R3.4 AutoML
          make_target: test-r-automl
          test_package: r
          r: "3.4.1"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: R3.4 AutoML
