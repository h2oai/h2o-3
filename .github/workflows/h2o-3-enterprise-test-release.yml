# ==============================================================================
#
#                    ENTERPRISE H2O-3 TEST RELEASE
#                    =============================
#
#   Self-contained test release pipeline for Enterprise H2O-3.
#   Uses test S3 bucket (s3://test.0xdata.com/test-release/h2o).
#
#   Pipeline Stages (matching Jenkins):
#   1. Checkout + Build
#   2. Publish to S3
#   3. Build Conda Packages (Py3.7-3.11, main + client)
#   4. Check Conda Packages Offline
#   5. Publish HELM to S3
#   6. Build Docker Images
#
#   Pre-configured Settings:
#   - TEST_RELEASE: true
#   - TEST_CREDENTIALS: true (always runs)
#   - UPDATE_LATEST: false
#   - UPDATE_LATEST_BRANCH: true
#   - UPLOAD_NEXUS: false (Enterprise releases are not public)
#
#   Configurable Inputs:
#   - branch: Branch to build (default: master)
#   - build_number: Build number (default: workflow run number)
#   - build_hadoop: Build with Hadoop support (default: true)
#   - publish_s3: Publish to S3 (default: true)
#   - publish_conda: Build Conda packages (default: true)
#   - publish_helm: Build Helm chart (default: true)
#   - publish_docker: Build Docker images (default: true)
#
# ==============================================================================

name: Enterprise H2O-3 Test Release

run-name: "Enterprise H2O-3 Test Release [${{ inputs.branch || 'master' }}]${{ inputs.build_number && format(' #{0}', inputs.build_number) || '' }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release [e.g., master, rel-3.42, valenad-test-release]'
        required: true
        default: 'master'
        type: string

      build_number:
        description: "Build number [leave empty to use workflow run number]"
        required: false
        type: string

      build_hadoop:
        description: "Build with Hadoop support"
        required: false
        type: boolean
        default: true

      publish_s3:
        description: "Publish artifacts to S3"
        required: false
        type: boolean
        default: true

      publish_conda:
        description: "Build and publish Conda packages"
        required: false
        type: boolean
        default: true

      publish_helm:
        description: "Build and publish Helm chart"
        required: false
        type: boolean
        default: true

      publish_docker:
        description: "Build and publish Docker images"
        required: false
        type: boolean
        default: true

# ==============================================================================
# PERMISSIONS
# ==============================================================================
permissions:
  contents: write
  id-token: write
  packages: write

# ==============================================================================
# ENVIRONMENT
# ==============================================================================
env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 353750902984.dkr.ecr.us-east-1.amazonaws.com
  ECR_ROLE: arn:aws:iam::353750902984:role/GitHub-OIDC-Role
  # Test release uses test S3 bucket
  S3_ROLE: arn:aws:iam::905418351423:role/Github-OIDC-Role-h2o-3-enterprise
  TEST_RELEASE_BUCKET: s3://test.0xdata.com/test-release/h2o

# ==============================================================================
# JOBS
# ==============================================================================
jobs:

  # ============================================================================
  # INIT: Configuration
  # ============================================================================
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.config.outputs.branch }}
      build_number: ${{ steps.config.outputs.build_number }}
      s3_root: ${{ steps.config.outputs.s3_root }}

    steps:
      - name: Determine Configuration
        id: config
        run: |
          BRANCH="${{ inputs.branch || 'master' }}"

          # Build number: user input or workflow run number
          if [ -n "${{ inputs.build_number }}" ]; then
            BUILD_NUMBER="${{ inputs.build_number }}"
          else
            BUILD_NUMBER="${{ github.run_number }}"
          fi

          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "s3_root=${{ env.TEST_RELEASE_BUCKET }}" >> $GITHUB_OUTPUT

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Enterprise Test Release Configuration

          | Setting | Value |
          |---------|-------|
          | Branch | \`${BRANCH}\` |
          | Build Number | \`${BUILD_NUMBER}\` |
          | Repository | \`h2oai/h2o-3-enterprise\` |
          | S3 Bucket | \`${{ env.TEST_RELEASE_BUCKET }}\` |
          | Test Release | true |
          | Test Credentials | true |
          | Build Hadoop | ${{ inputs.build_hadoop }} |
          | Publish S3 | ${{ inputs.publish_s3 != false }} |
          | Publish Conda | ${{ inputs.publish_conda != false }} |
          | Publish Helm | ${{ inputs.publish_helm != false }} |
          | Publish Docker | ${{ inputs.publish_docker != false }} |
          EOF

  # ============================================================================
  # TEST CREDENTIALS (Always runs)
  # ============================================================================
  test-credentials:
    name: Test Credentials
    needs: init
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS for ECR
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.ECR_ROLE }}
          role-session-name: test-creds-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Test AWS/ECR Credentials
        run: |
          echo "=== Testing AWS/ECR Credentials ==="
          aws sts get-caller-identity
          echo "AWS credentials: OK"

      - name: Configure AWS for S3
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.S3_ROLE }}
          role-session-name: test-s3-creds-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Test S3 Credentials
        run: |
          echo "=== Testing S3 Credentials ==="
          aws sts get-caller-identity
          # Test bucket access
          aws s3 ls ${{ env.TEST_RELEASE_BUCKET }}/ --max-items 1 || echo "Warning: Could not list bucket (may be empty)"
          echo "S3 credentials: OK"

      - name: Test Docker Hub Credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          echo "=== Testing Docker Hub Credentials ==="
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
            echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
            echo "Docker Hub credentials: OK"
            docker logout
          else
            echo "::warning::Docker Hub credentials not configured"
          fi

      - name: Test Anaconda Credentials
        env:
          ANACONDA_USERNAME: ${{ secrets.ANACONDA_USERNAME }}
          ANACONDA_PASSWORD: ${{ secrets.ANACONDA_PASSWORD }}
        run: |
          echo "=== Testing Anaconda Credentials ==="
          if [ -n "$ANACONDA_USERNAME" ] && [ -n "$ANACONDA_PASSWORD" ]; then
            echo "Anaconda credentials: Configured (username: $ANACONDA_USERNAME)"
          else
            echo "::warning::Anaconda credentials not configured"
          fi

      - name: Credentials Summary
        run: |
          echo "## Credentials Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Credential | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AWS/ECR | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Hub | ${{ secrets.DOCKERHUB_USERNAME != '' && 'OK' || 'Not configured' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Anaconda | ${{ secrets.ANACONDA_USERNAME != '' && 'OK' || 'Not configured' }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # BUILD: Compile H2O-3
  # ============================================================================
  build:
    name: Build
    needs: [init, test-credentials]
    uses: ./.github/workflows/release-build.yml
    with:
      branch: ${{ needs.init.outputs.branch }}
      build_number: ${{ needs.init.outputs.build_number }}
      build_hadoop: ${{ inputs.build_hadoop }}
      upload_nexus: false
      test_release: true
      repository: h2oai/h2o-3-enterprise
    secrets: inherit

  # ============================================================================
  # PUBLISH TO S3
  # ============================================================================
  publish-s3:
    name: Publish to S3
    needs: [init, build]
    if: inputs.publish_s3 != false
    uses: ./.github/workflows/release-publish-s3.yml
    with:
      branch: ${{ needs.init.outputs.branch }}
      build_number: ${{ needs.init.outputs.build_number }}
      project_version: ${{ needs.build.outputs.project_version }}
      s3_root: ${{ needs.init.outputs.s3_root }}
      update_latest: false
      update_latest_branch: true
      s3_role: arn:aws:iam::905418351423:role/Github-OIDC-Role-h2o-3-enterprise
    secrets: inherit

  # ============================================================================
  # BUILD CONDA PACKAGES (Py3.7-3.11, main + client)
  # ============================================================================
  publish-conda:
    name: Build Conda
    needs: [init, build, publish-s3]
    if: always() && inputs.publish_conda != false && (needs.publish-s3.result == 'success' || needs.publish-s3.result == 'skipped')
    uses: ./.github/workflows/release-publish-conda.yml
    with:
      branch: ${{ needs.init.outputs.branch }}
      build_number: ${{ needs.init.outputs.build_number }}
      project_version: ${{ needs.build.outputs.project_version }}
      s3_root: ${{ needs.init.outputs.s3_root }}
      upload_conda: false
      s3_role: arn:aws:iam::905418351423:role/Github-OIDC-Role-h2o-3-enterprise
    secrets: inherit

  # ============================================================================
  # PUBLISH HELM CHART
  # ============================================================================
  publish-helm:
    name: Publish Helm
    needs: [init, build, publish-s3]
    if: always() && inputs.publish_helm != false && (needs.publish-s3.result == 'success' || needs.publish-s3.result == 'skipped')
    uses: ./.github/workflows/release-publish-helm.yml
    with:
      branch: ${{ needs.init.outputs.branch }}
      project_version: ${{ needs.build.outputs.project_version }}
      test_release: true
      is_nightly: false
      s3_role: arn:aws:iam::905418351423:role/Github-OIDC-Role-h2o-3-enterprise
      repository: h2oai/h2o-3-enterprise
    secrets: inherit

  # ============================================================================
  # BUILD DOCKER IMAGES
  # ============================================================================
  publish-docker:
    name: Build Docker
    needs: [init, build, publish-s3]
    if: always() && inputs.publish_docker != false && (needs.publish-s3.result == 'success' || needs.publish-s3.result == 'skipped')
    uses: ./.github/workflows/release-publish-docker.yml
    with:
      branch: ${{ needs.init.outputs.branch }}
      build_number: ${{ needs.init.outputs.build_number }}
      project_version: ${{ needs.build.outputs.project_version }}
      test_release: true
      is_nightly: false
      update_latest: false
    secrets: inherit

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: Summary
    needs: [init, test-credentials, build, publish-s3, publish-conda, publish-helm, publish-docker]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Enterprise Test Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Credentials | ${{ needs.test-credentials.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish S3 | ${{ needs.publish-s3.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Conda | ${{ needs.publish-conda.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Helm | ${{ needs.publish-helm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Docker | ${{ needs.publish-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ needs.init.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.build.outputs.project_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** \`${{ needs.init.outputs.build_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Location:** \`${{ needs.init.outputs.s3_root }}/${{ needs.init.outputs.branch }}/${{ needs.init.outputs.build_number }}/\`" >> $GITHUB_STEP_SUMMARY

      - name: Check Overall Status
        run: |
          FAILED=false
          [[ "${{ needs.test-credentials.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.build.result }}" == "failure" ]] && FAILED=true
          [[ "${{ needs.publish-s3.result }}" == "failure" ]] && FAILED=true

          if [[ "$FAILED" == "true" ]]; then
            echo "::error::Enterprise release pipeline has critical failures"
            exit 1
          fi
