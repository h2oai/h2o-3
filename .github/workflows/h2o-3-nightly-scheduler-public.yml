# ==============================================================================
#
#                         H2O-3 GITHUB ACTIONS WORKFLOW INDEX
#                         ===================================
#
#   This index provides a quick reference to all H2O-3 CI/CD workflows.
#   Workflows are numbered for easy navigation in the GitHub Actions UI.
#
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │  PUBLIC WORKFLOWS (1.x) - Open Source H2O-3                             │
#   ├─────────────────────────────────────────────────────────────────────────┤
#   │  1.a  Nightly - Tests      Run full test suite (Smoke, Python, R, etc). │
#   │  1.b  Nightly Release      Build & publish nightly artifacts to S3      │
#   │  1.c  Official Release     Production release (PyPI, Conda, Docker)     │
#   │  1.d  Test Release         Test release to staging environment          │
#   │  1.e  Nightly Merge        Auto-merge release branch into master        │
#   │  1.f  Nightly Scheduler    Cron trigger for nightly pipelines           │
#   └─────────────────────────────────────────────────────────────────────────┘
#
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │  ENTERPRISE WORKFLOWS (2.x) - H2O-3 Enterprise                          │
#   ├─────────────────────────────────────────────────────────────────────────┤
#   │  2.a  Nightly - Tests      Run full test suite for enterprise           │
#   │  2.b  Nightly Release      Build & publish enterprise artifacts to S3   │
#   │  2.c  Official Release     Production release for enterprise            │
#   │  2.d  Test Release         Test release to staging environment          │
#   │  2.e  Nightly Merge        Auto-merge release branch into master        │
#   │  2.f  Nightly Scheduler    Cron trigger for nightly pipelines           │
#   └─────────────────────────────────────────────────────────────────────────┘
#
#   CURRENT FILE: 1.f  -  Public H2O-3 Nightly Scheduler
#
# ==============================================================================
#                         PUBLIC H2O-3 NIGHTLY SCHEDULER
# ==============================================================================
#
#   PURPOSE:
#     Triggers the nightly test pipeline for multiple H2O-3 branches.
#
#   BRANCHES:
#     - master
#     - rel-3.46.0
#
#   SCHEDULE:
#     - master:     Daily at 2:00 AM UTC
#     - rel-3.46.0: Daily at 5:00 AM UTC (3 hours after master)
#
# ==============================================================================

name: 1.f  -  Public H2O-3 Nightly Scheduler

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC - master
    - cron: '0 5 * * *'  # Daily at 5 AM UTC - rel branch (3 hours after master)

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to trigger (master or rel-3.46.0)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - master
          - rel-3.46.0

# ==============================================================================
# PERMISSIONS & CONCURRENCY
# ==============================================================================
permissions:
  actions: write
  contents: read

concurrency:
  group: public-nightly-scheduler-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

# ==============================================================================
# JOBS
# ==============================================================================
jobs:
  trigger-master:
    name: Trigger master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.branch == 'both' || inputs.branch == 'master') ||
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
    steps:
      - name: Trigger Nightly Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering nightly workflow for branch: master"

          gh workflow run h2o-3-nightly-tests-public.yml \
            --repo ${{ github.repository }} \
            -f branch="master" \
            -f run_smoke=true \
            -f run_python=true \
            -f run_r=true \
            -f run_java=true \
            -f run_flow=true

          echo "Workflow triggered for master"

  trigger-rel:
    name: Trigger rel-3.46.0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.branch == 'both' || inputs.branch == 'rel-3.46.0') ||
      github.event_name == 'schedule' && github.event.schedule == '0 5 * * *'
    steps:
      - name: Trigger Nightly Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering nightly workflow for branch: rel-3.46.0"

          gh workflow run h2o-3-nightly-tests-public.yml \
            --repo ${{ github.repository }} \
            -f branch="rel-3.46.0" \
            -f run_smoke=true \
            -f run_python=true \
            -f run_r=true \
            -f run_java=true \
            -f run_flow=true

          echo "Workflow triggered for rel-3.46.0"
