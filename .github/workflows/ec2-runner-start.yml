# ==============================================================================
#                         EC2 RUNNER START
# ==============================================================================
#
# PURPOSE:
#   Reusable workflow to start an EC2 self-hosted runner.
#   Includes retry logic with exponential backoff for API rate limiting
#   and transient EC2 capacity issues.
#
# RETRY STRATEGY:
#   - 3 total attempts with exponential backoff (reduced from 5 to conserve API quota)
#   - Attempt 1: Initial try
#   - Attempt 2: After 180-300s delay
#   - Attempt 3: After 300-480s delay (final attempt)
#
# CLEANUP:
#   - Instance names include run_id to prevent cross-branch interference
#   - Pre-cleanup: Terminates orphaned instances from THIS workflow run before starting
#   - Inter-attempt: Terminates tracked instances from failed attempts before retry
#   - Final cleanup: If all attempts fail, terminates any untracked orphaned instances
#   - NOTE: Old orphans from crashed runs require manual cleanup or scheduled Lambda
#
# JIT RUNNER MODE:
#   - Uses Just-In-Time (JIT) runner configuration instead of traditional registration token
#   - JIT mode eliminates the polling loop that checks for runner registration
#   - Each runner makes only ~2 API calls instead of ~30+ (generate-jitconfig + minimal overhead)
#   - Runners auto-deregister after completing one job - no cleanup needed
#   - Reduces API usage from ~5,500 calls to ~150 calls for 62 runners (97% reduction)
#
# RATE LIMITING:
#   - Stagger delay of 0-300s (5 min window) spreads GitHub API requests
#   - Pre-check of GitHub API rate limit with automatic wait if quota < 100
#   - With JIT mode, rate limiting is much less likely to occur
#
# OUTPUTS:
#   - label: Runner label for runs-on
#   - ec2_id: EC2 instance ID for cleanup
#
# ==============================================================================

name: Start EC2 Runner

on:
  workflow_call:
    inputs:
      name:
        description: 'Runner name for EC2 tagging'
        required: true
        type: string

      instance_type:
        description: 'EC2 instance type'
        required: false
        type: string
        default: 'm5.4xlarge'

    outputs:
      label:
        description: 'Runner label for runs-on'
        value: ${{ jobs.start.outputs.label }}

      ec2_id:
        description: 'EC2 instance ID'
        value: ${{ jobs.start.outputs.ec2_id }}

env:
  AWS_REGION: us-east-1
  EC2_ROLE: arn:aws:iam::041740254655:role/GitHub-OIDC-Role
  AMI_ID: ami-0b754f369244f678b
  SUBNET_ID: subnet-0b990c6f0c5a7f708
  SECURITY_GROUP: sg-0624a8f944a8e8b57

jobs:
  start:
    name: Start EC2
    runs-on: ubuntu-latest
    timeout-minutes: 600
    outputs:
      label: ${{ steps.final.outputs.label }}
      ec2_id: ${{ steps.final.outputs.ec2_id }}

    steps:
      # NOTE: AWS credentials are configured AFTER stagger and rate limit checks
      # to prevent token expiry during long waits. AWS session tokens expire after 1 hour.

      - name: Stagger Start
        run: |
          # With JIT mode, we only need ~2 API calls per runner instead of ~30+
          # Reduced stagger window (0-300s = 5 minutes) is sufficient
          DELAY=$((RANDOM % 300))
          echo "Waiting ${DELAY}s to stagger API calls (5-minute window)..."
          sleep $DELAY

      - name: Check GitHub API Rate Limit
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          # Check rate limit and wait if nearly exhausted
          # With JIT mode, each runner only needs ~2 API calls, so threshold of 100 is sufficient
          RATE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/rate_limit)
          REMAINING=$(echo "$RATE_INFO" | jq -r '.resources.core.remaining')
          RESET_TIME=$(echo "$RATE_INFO" | jq -r '.resources.core.reset')

          echo "GitHub API rate limit remaining: $REMAINING"

          # If remaining requests < 100, wait until reset
          if [ "$REMAINING" -lt 100 ]; then
            CURRENT_TIME=$(date +%s)
            WAIT_TIME=$((RESET_TIME - CURRENT_TIME + 30))
            if [ "$WAIT_TIME" -gt 0 ] && [ "$WAIT_TIME" -lt 3600 ]; then
              echo "Rate limit low ($REMAINING remaining). Waiting ${WAIT_TIME}s for reset..."
              sleep $WAIT_TIME
            fi
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.EC2_ROLE }}
          role-session-name: ec2-start-${{ inputs.name }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Pre-cleanup Orphaned Instances
        run: |
          # Terminate any orphaned instances from THIS workflow run (same run_id)
          # This prevents cleaning up instances from other branches running simultaneously
          INSTANCE_NAME="gha-runner-${{ inputs.name }}-${{ github.run_id }}"
          echo "Checking for orphaned instances with name: $INSTANCE_NAME"
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_NAME" \
                      "Name=instance-state-name,Values=pending,running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Found orphaned instances: $INSTANCE_IDS"
            echo "Terminating orphaned instances..."
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS || true
            # Wait for termination to propagate
            sleep 10
          else
            echo "No orphaned instances found"
          fi

      - name: Start EC2 (Attempt 1)
        id: start1
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          use-jit: true
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}-${{ github.run_id }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 1
        if: steps.start1.outcome == 'failure' && steps.start1.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 1: ${{ steps.start1.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start1.outputs.ec2-instance-id }} || true

      - name: Retry Delay 1
        if: steps.start1.outcome == 'failure'
        run: |
          # Longer backoff (180-300s) to allow rate limit recovery
          sleep $((RANDOM % 120 + 180))

      - name: Refresh AWS Credentials (Attempt 2)
        if: steps.start1.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.EC2_ROLE }}
          role-session-name: ec2-start-${{ inputs.name }}-retry1
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Check Rate Limit (Attempt 2)
        if: steps.start1.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          RATE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/rate_limit)
          REMAINING=$(echo "$RATE_INFO" | jq -r '.resources.core.remaining')
          RESET_TIME=$(echo "$RATE_INFO" | jq -r '.resources.core.reset')
          echo "GitHub API rate limit remaining: $REMAINING"
          if [ "$REMAINING" -lt 100 ]; then
            CURRENT_TIME=$(date +%s)
            WAIT_TIME=$((RESET_TIME - CURRENT_TIME + 30))
            if [ "$WAIT_TIME" -gt 0 ] && [ "$WAIT_TIME" -lt 3600 ]; then
              echo "Rate limit low ($REMAINING remaining). Waiting ${WAIT_TIME}s for reset..."
              sleep $WAIT_TIME
            fi
          fi

      - name: Start EC2 (Attempt 2)
        id: start2
        if: steps.start1.outcome == 'failure'
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          use-jit: true
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}-${{ github.run_id }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 2
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start2.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 2: ${{ steps.start2.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start2.outputs.ec2-instance-id }} || true

      - name: Retry Delay 2
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        run: |
          # Extended backoff (300-480s) before final attempt
          sleep $((RANDOM % 180 + 300))

      - name: Refresh AWS Credentials (Attempt 3)
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.EC2_ROLE }}
          role-session-name: ec2-start-${{ inputs.name }}-retry2
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Check Rate Limit (Attempt 3)
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_RUNNER_PAT }}
        run: |
          RATE_INFO=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/rate_limit)
          REMAINING=$(echo "$RATE_INFO" | jq -r '.resources.core.remaining')
          RESET_TIME=$(echo "$RATE_INFO" | jq -r '.resources.core.reset')
          echo "GitHub API rate limit remaining: $REMAINING"
          if [ "$REMAINING" -lt 100 ]; then
            CURRENT_TIME=$(date +%s)
            WAIT_TIME=$((RESET_TIME - CURRENT_TIME + 30))
            if [ "$WAIT_TIME" -gt 0 ] && [ "$WAIT_TIME" -lt 3600 ]; then
              echo "Rate limit low ($REMAINING remaining). Waiting ${WAIT_TIME}s for reset..."
              sleep $WAIT_TIME
            fi
          fi

      - name: Start EC2 (Attempt 3 - Final)
        id: start3
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        uses: machulav/ec2-github-runner@v2.6.1
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          use-jit: true
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}-${{ github.run_id }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Set Outputs
        id: final
        run: |
          # Check both outcome AND label to ensure we pick a successful attempt
          # Failed attempts may still have label output if EC2 started but runner registration failed
          if [ "${{ steps.start1.outcome }}" == "success" ] && [ -n "${{ steps.start1.outputs.label }}" ]; then
            echo "label=${{ steps.start1.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start1.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 1"
          elif [ "${{ steps.start2.outcome }}" == "success" ] && [ -n "${{ steps.start2.outputs.label }}" ]; then
            echo "label=${{ steps.start2.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start2.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 2"
          elif [ "${{ steps.start3.outcome }}" == "success" ] && [ -n "${{ steps.start3.outputs.label }}" ]; then
            echo "label=${{ steps.start3.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start3.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 3"
          else
            echo "all_failed=true" >> $GITHUB_OUTPUT
            echo "::error::All 3 EC2 start attempts failed"
          fi

      - name: Refresh AWS Credentials (Final Cleanup)
        if: steps.final.outputs.all_failed == 'true'
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.EC2_ROLE }}
          role-session-name: ec2-start-${{ inputs.name }}-cleanup
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Final Cleanup on Total Failure
        if: steps.final.outputs.all_failed == 'true'
        run: |
          # Clean up any orphaned instances from THIS workflow run
          INSTANCE_NAME="gha-runner-${{ inputs.name }}-${{ github.run_id }}"
          echo "All attempts failed. Cleaning up any orphaned instances with name: $INSTANCE_NAME"
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_NAME" \
                      "Name=instance-state-name,Values=pending,running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Found orphaned instances: $INSTANCE_IDS"
            echo "Terminating orphaned instances..."
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS || true
          else
            echo "No orphaned instances found"
          fi

          # Exit with failure after cleanup
          exit 1
