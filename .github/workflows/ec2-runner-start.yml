# ==============================================================================
#                         EC2 RUNNER START
# ==============================================================================
#
# PURPOSE:
#   Reusable workflow to start an EC2 self-hosted runner.
#   Includes retry logic with exponential backoff for API rate limiting
#   and transient EC2 capacity issues.
#
# RETRY STRATEGY:
#   - 5 total attempts with exponential backoff
#   - Attempt 1: Initial try
#   - Attempt 2: After 60-120s delay
#   - Attempt 3: After 120-240s delay
#   - Attempt 4: After 180-360s delay
#   - Attempt 5: After 240-480s delay (final attempt)
#
# CLEANUP:
#   - Pre-cleanup: Terminates any orphaned instances with same name tag before starting
#   - Inter-attempt: Terminates tracked instances from failed attempts before retry
#   - Final cleanup: If all attempts fail, terminates any untracked orphaned instances
#
# RATE LIMITING:
#   - Stagger delay of 60-180s helps avoid GitHub API rate limiting
#   - GitHub rate limit errors occur when too many runners request tokens simultaneously
#
# OUTPUTS:
#   - label: Runner label for runs-on
#   - ec2_id: EC2 instance ID for cleanup
#
# ==============================================================================

name: Start EC2 Runner

on:
  workflow_call:
    inputs:
      name:
        description: 'Runner name for EC2 tagging'
        required: true
        type: string

      instance_type:
        description: 'EC2 instance type'
        required: false
        type: string
        default: 'm5.4xlarge'

    outputs:
      label:
        description: 'Runner label for runs-on'
        value: ${{ jobs.start.outputs.label }}

      ec2_id:
        description: 'EC2 instance ID'
        value: ${{ jobs.start.outputs.ec2_id }}

env:
  AWS_REGION: us-east-1
  EC2_ROLE: arn:aws:iam::041740254655:role/GitHub-OIDC-Role
  AMI_ID: ami-0b754f369244f678b
  SUBNET_ID: subnet-0b990c6f0c5a7f708
  SECURITY_GROUP: sg-0624a8f944a8e8b57

jobs:
  start:
    name: Start EC2
    runs-on: ubuntu-latest
    timeout-minutes: 600
    outputs:
      label: ${{ steps.final.outputs.label }}
      ec2_id: ${{ steps.final.outputs.ec2_id }}

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          role-to-assume: ${{ env.EC2_ROLE }}
          role-session-name: ec2-start-${{ inputs.name }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Stagger Start
        run: |
          # Increased stagger delay to avoid GitHub API rate limiting when starting many runners
          DELAY=$((RANDOM % 120 + 60))
          echo "Waiting ${DELAY}s to stagger API calls..."
          sleep $DELAY

      - name: Pre-cleanup Orphaned Instances
        run: |
          # Terminate any orphaned instances with the same name tag from previous failed runs
          echo "Checking for orphaned instances with name: gha-runner-${{ inputs.name }}"
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=gha-runner-${{ inputs.name }}" \
                      "Name=instance-state-name,Values=pending,running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Found orphaned instances: $INSTANCE_IDS"
            echo "Terminating orphaned instances..."
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS || true
            # Wait for termination to propagate
            sleep 10
          else
            echo "No orphaned instances found"
          fi

      - name: Start EC2 (Attempt 1)
        id: start1
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.3.9
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 1
        if: steps.start1.outcome == 'failure' && steps.start1.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 1: ${{ steps.start1.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start1.outputs.ec2-instance-id }} || true

      - name: Retry Delay 1
        if: steps.start1.outcome == 'failure'
        run: sleep $((RANDOM % 60 + 60))

      - name: Start EC2 (Attempt 2)
        id: start2
        if: steps.start1.outcome == 'failure'
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.3.9
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 2
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start2.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 2: ${{ steps.start2.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start2.outputs.ec2-instance-id }} || true

      - name: Retry Delay 2
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        run: sleep $((RANDOM % 120 + 120))

      - name: Start EC2 (Attempt 3)
        id: start3
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure'
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.3.9
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 3
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure' && steps.start3.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 3: ${{ steps.start3.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start3.outputs.ec2-instance-id }} || true

      - name: Retry Delay 3
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure'
        run: sleep $((RANDOM % 180 + 180))

      - name: Start EC2 (Attempt 4)
        id: start4
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure'
        continue-on-error: true
        uses: machulav/ec2-github-runner@v2.3.9
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Cleanup Failed Attempt 4
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure' && steps.start4.outcome == 'failure' && steps.start4.outputs.ec2-instance-id != ''
        run: |
          echo "Terminating orphaned EC2 instance from attempt 4: ${{ steps.start4.outputs.ec2-instance-id }}"
          aws ec2 terminate-instances --instance-ids ${{ steps.start4.outputs.ec2-instance-id }} || true

      - name: Retry Delay 4
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure' && steps.start4.outcome == 'failure'
        run: sleep $((RANDOM % 240 + 240))

      - name: Start EC2 (Attempt 5)
        id: start5
        if: steps.start1.outcome == 'failure' && steps.start2.outcome == 'failure' && steps.start3.outcome == 'failure' && steps.start4.outcome == 'failure'
        uses: machulav/ec2-github-runner@v2.3.9
        with:
          mode: start
          github-token: ${{ secrets.GH_RUNNER_PAT }}
          ec2-image-id: ${{ env.AMI_ID }}
          ec2-instance-type: ${{ inputs.instance_type }}
          subnet-id: ${{ env.SUBNET_ID }}
          security-group-id: ${{ env.SECURITY_GROUP }}
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "gha-runner-${{ inputs.name }}"},
              {"Key": "h2o/gitHub-repository", "Value": "${{ github.repository }}"},
              {"Key": "h2o/owner", "Value": "rohan.silva@h2o.ai"},
              {"Key": "h2o/environment", "Value": "prd"},
              {"Key": "h2o/scheduling", "Value": "self-managed"},
              {"Key": "h2o/github-workflow", "Value": "${{ github.workflow }}"}
            ]

      - name: Set Outputs
        id: final
        run: |
          if [ -n "${{ steps.start1.outputs.label }}" ]; then
            echo "label=${{ steps.start1.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start1.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 1"
          elif [ -n "${{ steps.start2.outputs.label }}" ]; then
            echo "label=${{ steps.start2.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start2.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 2"
          elif [ -n "${{ steps.start3.outputs.label }}" ]; then
            echo "label=${{ steps.start3.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start3.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 3"
          elif [ -n "${{ steps.start4.outputs.label }}" ]; then
            echo "label=${{ steps.start4.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start4.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 4"
          elif [ -n "${{ steps.start5.outputs.label }}" ]; then
            echo "label=${{ steps.start5.outputs.label }}" >> $GITHUB_OUTPUT
            echo "ec2_id=${{ steps.start5.outputs.ec2-instance-id }}" >> $GITHUB_OUTPUT
            echo "EC2 started on attempt 5"
          else
            echo "all_failed=true" >> $GITHUB_OUTPUT
            echo "::error::All 5 EC2 start attempts failed"
          fi

      - name: Final Cleanup on Total Failure
        if: steps.final.outputs.all_failed == 'true'
        run: |
          # Clean up any orphaned instances that were created but not tracked
          echo "All attempts failed. Cleaning up any orphaned instances with name: gha-runner-${{ inputs.name }}"
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=gha-runner-${{ inputs.name }}" \
                      "Name=instance-state-name,Values=pending,running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
            echo "Found orphaned instances: $INSTANCE_IDS"
            echo "Terminating orphaned instances..."
            aws ec2 terminate-instances --instance-ids $INSTANCE_IDS || true
          else
            echo "No orphaned instances found"
          fi

          # Exit with failure after cleanup
          exit 1
