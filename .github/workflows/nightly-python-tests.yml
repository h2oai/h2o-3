  stop-py37-smoke-main:
    name: Stop EC2 - Py3.7 Main
    needs: [start-py37-smoke-main, py37-smoke-main]
    if: always()
    uses: ./.github/workflows/ec2-runner-stop.yml
    with:
      label: ${{ needs.start-py37-smoke-main.outputs.label }}
      ec2_id: ${{ needs.start-py37-smoke-main.outputs.ec2_id }}
    secrets: inherit

  stop-py37-smoke-minimal:
