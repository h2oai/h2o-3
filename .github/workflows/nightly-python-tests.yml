# ==============================================================================
#                           PYTHON TEST SUITE
# ==============================================================================
#
# 17 Python tests across Python 3.7 and 3.11 - All on EC2 runners
#
# CATEGORIES:
#   - Assembly Smoke (3)  : Main, Minimal, Steam package validation
#   - PR_STAGES (9)       : Core functionality tests
#   - NIGHTLY_STAGES (5)  : Extended tests (Explain, XGBoost stress)
#
# ARCHITECTURE:
#   1. Start 17 EC2 runners in parallel
#   2. Run tests on each dedicated runner
#   3. Stop all runners (always, for cleanup)
#
# ==============================================================================

name: Python Tests

on:
  workflow_call:
    inputs:
      h2o3_branch:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  checks: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 353750902984.dkr.ecr.us-east-1.amazonaws.com
  ECR_ROLE: arn:aws:iam::353750902984:role/GitHub-OIDC-Role
  DOCKER_VERSION: "46"
  H2O3_REPO: h2oai/h2o-3
  RETENTION: 14
  EFS_SMALLDATA: /home/ubuntu/smalldata
  EFS_BIGDATA: /home/ubuntu/bigdata

jobs:
  # ============================================================================
  # START EC2 RUNNERS (27 in parallel)
  # ============================================================================

  # Assembly Smoke Tests
  start-py37-smoke-main:
    name: Start EC2 - Py3.7 Main
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-smoke-main
    secrets: inherit

  start-py37-smoke-minimal:
    name: Start EC2 - Py3.7 Minimal
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-smoke-minimal
    secrets: inherit

  start-py37-smoke-steam:
    name: Start EC2 - Py3.7 Steam
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-smoke-steam
    secrets: inherit

  # PR_STAGES


  start-py37-single-node:
    name: Start EC2 - Py3.7 Single Node
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-single-node
    secrets: inherit


  start-py37-small:
    name: Start EC2 - Py3.7 Small
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-small
    secrets: inherit

  start-py37-mojo2:
    name: Start EC2 - Py3.7 MOJO2
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-mojo2
    secrets: inherit

  start-py37-automl:
    name: Start EC2 - Py3.7 AutoML
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-automl
    secrets: inherit

  start-py37-automl-smoke:
    name: Start EC2 - Py3.7 AutoML Smoke
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-automl-smoke
    secrets: inherit

  start-py37-fault-tolerance:
    name: Start EC2 - Py3.7 Fault Tolerance
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-fault-tolerance
    secrets: inherit

  start-py37-medium-large:
    name: Start EC2 - Py3.7 Medium-large
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-medium-large
    secrets: inherit

  start-py37-xlarge:
    name: Start EC2 - Py3.7 X-large
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-xlarge
    secrets: inherit

  start-py37-demos:
    name: Start EC2 - Py3.7 Demos
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-demos
    secrets: inherit

  start-py37-demos-scikit:
    name: Start EC2 - Py3.7 Demos Scikit
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-demos-scikit
    secrets: inherit


  start-external-xgboost:
    name: Start EC2 - External XGBoost
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: external-xgboost
    secrets: inherit






  # NIGHTLY_STAGES
  start-py37-explain:
    name: Start EC2 - Py3.7 Explain
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py37-explain
    secrets: inherit

  start-py311-single-node:
    name: Start EC2 - Py3.11 Single Node
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py311-single-node
    secrets: inherit

  start-py311-fault-tolerance:
    name: Start EC2 - Py3.11 Fault Tolerance
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: py311-fault-tolerance
    secrets: inherit

  start-xgboost-stress:
    name: Start EC2 - XGBoost Stress
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: xgboost-stress
    secrets: inherit

  # start-persist-drive:
  #   name: Start EC2 - Persist Drive
  #   uses: ./.github/workflows/ec2-runner-start.yml
  #   with:
  #     name: persist-drive
  #   secrets: inherit

  # ============================================================================
  # RUN TESTS (on dedicated EC2 runners)
  # ============================================================================

  # Assembly Smoke Tests
  py37-smoke-main:
    name: Py3.7 Smoke (Main)
    needs: start-py37-smoke-main
    runs-on: ${{ needs.start-py37-smoke-main.outputs.label }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: Py3.7 Smoke (Main)
          make_target: test-py-smoke-main
          test_package: main
          python: "3.7"
          image: python-3.7-jdk-8
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: Py3.7 Smoke (Main)
          job_status: ${{ job.status }}

  py37-smoke-minimal:
    name: Py3.7 Smoke (Minimal)
    needs: start-py37-smoke-minimal
    runs-on: ${{ needs.start-py37-smoke-minimal.outputs.label }}
