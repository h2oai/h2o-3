# ==============================================================================
#                            JAVA TEST SUITE
# ==============================================================================
#
# 11 Java/JUnit tests on dedicated EC2 runners (EFS data access required)
#
# TESTS:
#   - Java 8  : RuleFit, JUnit, Core JUnit, AutoML JUnit, REST Smoke,
#               Mojo Pipeline, Clustering, XGBoost Multinode, Logger Init
#   - Java 11 : JUnit
#   - Java 17 : JUnit
#
# ARCHITECTURE:
#   1. Start 11 EC2 runners in parallel
#   2. Run tests on each dedicated runner
#   3. Stop all runners (always, for cleanup)
#
# ==============================================================================

name: Java Tests

on:
  workflow_call:
    inputs:
      h2o3_branch:
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  checks: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 353750902984.dkr.ecr.us-east-1.amazonaws.com
  ECR_ROLE: arn:aws:iam::353750902984:role/GitHub-OIDC-Role
  DOCKER_VERSION: "46"
  H2O3_REPO: h2oai/h2o-3
  RETENTION: 14
  EFS_SMALLDATA: /home/ubuntu/smalldata
  EFS_BIGDATA: /home/ubuntu/bigdata

jobs:
  # ============================================================================
  # START EC2 RUNNERS (11 in parallel)
  # ============================================================================
  start-java8-rulefit:
    name: Start - Java 8 RuleFit
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-rulefit
    secrets: inherit

  # start-java8-junit:
  #   name: Start - Java 8 JUnit
  #   uses: ./.github/workflows/ec2-runner-start.yml
  #   with:
  #     name: java8-junit
  #     instance_type: m5.8xlarge
  #   secrets: inherit

  start-java8-core:
    name: Start - Java 8 Core
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-core
    secrets: inherit

  start-java8-automl:
    name: Start - Java 8 AutoML
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-automl
    secrets: inherit

  # start-java11-junit:
  #   name: Start - Java 11 JUnit
  #   uses: ./.github/workflows/ec2-runner-start.yml
  #   with:
  #     name: java11-junit
  #     instance_type: m5.8xlarge
  #   secrets: inherit

  # start-java17-junit:
  #   name: Start - Java 17 JUnit
  #   uses: ./.github/workflows/ec2-runner-start.yml
  #   with:
  #     name: java17-junit
  #     instance_type: m5.8xlarge
  #   secrets: inherit

  start-java8-rest-smoke:
    name: Start - Java 8 REST Smoke
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-rest-smoke
    secrets: inherit

  start-java8-mojo-pipeline:
    name: Start - Java 8 Mojo Pipeline
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-mojo-pipeline
    secrets: inherit

  start-java8-clustering:
    name: Start - Java 8 Clustering
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-clustering
    secrets: inherit

  start-java8-xgb-multi:
    name: Start - Java 8 XGBoost Multinode
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-xgb-multi
    secrets: inherit

  start-java8-logger:
    name: Start - Java 8 Logger Init
    uses: ./.github/workflows/ec2-runner-start.yml
    with:
      name: java8-logger
    secrets: inherit

  # ============================================================================
  # JAVA TESTS (Run on dedicated EC2 runners)
  # ============================================================================
  java8-rulefit:
    name: Java 8 RuleFit
    needs: start-java8-rulefit
    runs-on: ${{ needs.start-java8-rulefit.outputs.label }}
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-test
        with:
          name: Java 8 RuleFit
          make_target: test-junit-rulefit-jenkins
          test_package: java
          java: "8"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: Java 8 RuleFit
          job_status: ${{ job.status }}

