      - uses: ./.github/actions/run-test
        with:
          name: Java 8 Logger Init
          make_target: test-logger-initialize-properly
          test_package: java
          java: "8"
          h2o3_branch: ${{ inputs.h2o3_branch }}
          mount_efs: "true"
          smalldata_path: ${{ env.EFS_SMALLDATA }}
          bigdata_path: ${{ env.EFS_BIGDATA }}
      - name: Publish Results
        if: always()
        uses: ./.github/actions/publish-results
        with:
          name: Java 8 Logger Init
          job_status: ${{ job.status }}

  # ============================================================================
  # STOP EC2 RUNNERS (Always run for cleanup)
  # ============================================================================
  stop-java8-rulefit:
    name: Stop - Java 8 RuleFit
    needs: [start-java8-rulefit, java8-rulefit]
    if: always()
    uses: ./.github/workflows/ec2-runner-stop.yml
    with:
      label: ${{ needs.start-java8-rulefit.outputs.label }}
      ec2_id: ${{ needs.start-java8-rulefit.outputs.ec2_id }}
    secrets: inherit

