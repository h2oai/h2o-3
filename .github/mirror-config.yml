# Mirror Configuration
# h2o-3-enterprise is the PRIMARY development repo
# Changes are mirrored OUT to the public h2oai/h2o-3 repo

branches:
  - master
  - rel-3.46.0

# Sync tags to public repo
sync_tags: true

# Enterprise-only paths that should NOT be mirrored to public h2o-3
# These files/directories exist only in enterprise and are excluded from public sync
enterprise_only_paths:
  - .github/workflows/
  - .github/actions/
  - .github/mirror-config.yml
  - CLAUDE.md
  - LICENSE
  # Add other enterprise-only paths here as needed
  # - h2o-enterprise-algos/
  # - enterprise-features/
