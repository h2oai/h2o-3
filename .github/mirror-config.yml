# Mirror Configuration
# Defines which branches to sync from public h2oai/h2o-3 to h2o-3-enterprise

branches:
  - master
  - rel-3.46.0

# Sync tags from upstream
sync_tags: true

# Enterprise-only paths that should NOT be overwritten by upstream
# These files/directories are preserved during sync
protected_paths:
  - .github/workflows/
  - .github/actions/
  - .github/mirror-config.yml
  - CLAUDE.md
